<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favorites - LustHub</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>

<body style="padding-top: 100px;">
    <header id="mainHeader" class="scrolled">
        <div class="header-left">
            <a href="/" class="logo"><i class="fas fa-arrow-left"
                    style="font-size: 20px; color: white; margin-right: 15px;"></i>Lust<span>Hub</span></a>
        </div>
    </header>

    <div class="container" style="min-height: 60vh;">
        <div class="section-header" style="margin-top: 20px;">
            <h2 class="section-title"><i class="fas fa-heart"
                    style="color: var(--netflix-red); margin-right: 10px;"></i>Watch Later</h2>
        </div>

        <div class="ad-container"><span>Advertisement Space (728x90)</span></div>

        <div class="movie-grid" id="fav-grid"></div>
    </div>

    <div id="footer-placeholder"></div>
    <script src="app.js"></script>
</body>

</html>
